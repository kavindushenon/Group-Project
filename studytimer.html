<!doctype html>
<html>
  <head>
    <title>Student Toolkit</title>

    <style>
      /* PAGE STYLE */

      body {
        font-family: Arial;
        margin: 0;
      }

      /* NAVBAR */

      .navbar {
        background: #333;
        color: white;
        display: flex;
        justify-content: space-between;
        padding: 15px;
      }

      .navbar ul {
        list-style: none;
        display: flex;
        gap: 20px;
        margin: 0;
      }

      .navbar li {
        cursor: pointer;
      }

      /* LAYOUT */

      .container {
        display: flex;
      }

      /* SIDEBAR */

      .sidebar {
        width: 250px;
        background: #f4f4f4;
        padding: 20px;
        height: 100vh;
      }

      .sidebar ul {
        padding-left: 15px;
      }

      /* MAIN AREA */

      .main {
        flex: 1;
        padding: 40px;
      }

      /* TIMER */

      .timer {
        text-align: center;
        margin-top: 40px;
      }

      #time {
        font-size: 60px;
        margin-bottom: 20px;
      }

      button {
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->

    <div class="navbar">
      <h2>Student Toolkit</h2>

      <ul>
        <li>Dashboard</li>
        <li>Tools</li>
        <li>Resources</li>
        <li>Settings</li>
      </ul>
    </div>

    <div class="container">
      <!-- SIDEBAR -->

      <div class="sidebar">
        <h3>Upcoming Events</h3>

        <ul>
          <li>Math Exam - Monday</li>
          <li>Assignment Deadline - Friday</li>
          <li>Study Group - Saturday</li>
        </ul>
      </div>

      <!-- MAIN DASHBOARD -->

      <div class="main">
        <h2>Pomodoro Study Timer</h2>

        <div class="timer">
          <h1 id="time">25:00</h1>

          <button onclick="startTimer()">Start</button>

          <button onclick="resetTimer()">Reset</button>
        </div>
      </div>
    </div>

    <script>
      let time = 1500;
      let timer;

      function updateDisplay() {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;

        if (seconds < 10) {
          seconds = "0" + seconds;
        }

        document.getElementById("time").innerText = minutes + ":" + seconds;
      }

      function startTimer() {
        timer = setInterval(function () {
          time--;

          updateDisplay();

          if (time <= 0) {
            clearInterval(timer);
            alert("Pomodoro session finished!");
          }
        }, 1000);
      }

      function resetTimer() {
        clearInterval(timer);
        time = 1500;
        updateDisplay();
      }

      updateDisplay();
    </script>
  </body>
</html>
