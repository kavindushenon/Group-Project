<!doctype html>
<html>
  <head>
    <title>Student Toolkit</title>

    <style>
      /* GLOBAL */

      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        background: #f2f5f9;
      }

      /* NAVBAR */

      .navbar {
        background: linear-gradient(90deg, #4b6cb7, #182848);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .navbar ul {
        list-style: none;
        display: flex;
        gap: 25px;
        margin: 0;
        padding: 0;
      }

      .navbar li {
        cursor: pointer;
        transition: 0.3s;
      }

      .navbar li:hover {
        opacity: 0.7;
      }

      /* LAYOUT */

      .container {
        display: flex;
      }

      /* SIDEBAR */

      .sidebar {
        width: 260px;
        background: white;
        padding: 25px;
        height: 100vh;
        box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
      }

      .sidebar h3 {
        margin-top: 0;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }

      .sidebar ul {
        padding-left: 15px;
        line-height: 1.8;
      }

      /* MAIN AREA */

      .main {
        flex: 1;
        padding: 50px;
      }

      /* TIMER CARD */

      .timer {
        background: white;
        padding: 40px;
        max-width: 400px;
        margin: auto;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      /* TIMER TEXT */

      #time {
        font-size: 60px;
        margin-bottom: 25px;
        color: #182848;
      }

      /* BUTTONS */

      button {
        padding: 12px 25px;
        margin: 10px;
        font-size: 16px;
        border: none;
        border-radius: 6px;
        background: #4b6cb7;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #182848;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->

    <div class="navbar">
      <h2>Student Toolkit</h2>

      <ul>
        <li>Dashboard</li>
        <li>Tools</li>
        <li>Resources</li>
        <li>Settings</li>
      </ul>
    </div>

    <div class="container">
      <!-- SIDEBAR -->

      <div class="sidebar">
        <h3>Upcoming Events</h3>

        <ul>
          <li>📘 Math Exam - Monday</li>
          <li>📝 Assignment Deadline - Friday</li>
          <li>👥 Study Group - Saturday</li>
        </ul>
      </div>

      <!-- MAIN DASHBOARD -->

      <div class="main">
        <h2>Pomodoro Study Timer</h2>

        <div class="timer">
          <h1 id="time">25:00</h1>

          <button onclick="startTimer()">Start</button>
          <button onclick="resetTimer()">Reset</button>
        </div>
      </div>
    </div>

    <script>
      let time = 1500;
      let timer;

      function updateDisplay() {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;

        if (seconds < 10) {
          seconds = "0" + seconds;
        }

        document.getElementById("time").innerText = minutes + ":" + seconds;
      }

      function startTimer() {
        timer = setInterval(function () {
          time--;

          updateDisplay();

          if (time <= 0) {
            clearInterval(timer);
            alert("Pomodoro session finished!");
          }
        }, 1000);
      }

      function resetTimer() {
        clearInterval(timer);
        time = 1500;
        updateDisplay();
      }

      updateDisplay();
    </script>
  </body>
</html>
